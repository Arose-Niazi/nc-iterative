            { "@type": "Thing", "name": "Jacobi Method", "description": "An iterative algorithm for solving systems of linear equations" },

    }

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css?v=1">

    <!-- Math.js from CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.2.1/math.min.js" defer></script>
    <!-- App -->
    <script src="app.js?v=1" defer></script>
</head>
<body>

    <!-- Header -->
    <!-- Suite Navigation -->
    <nav class="suite-nav" aria-label="Suite navigation">
        <a href="https://nc.arose-niazi.me/">← NC Suite</a>
    </nav>

    <header class="site-header">
        <div class="header-inner">
            <h1 class="site-title">Iterative Methods<span>Calculator</span></h1>
            <div class="header-actions">
                <button id="history-toggle-btn" type="button" aria-label="Toggle history panel">History</button>
                <button id="theme-toggle" type="button" aria-label="Toggle dark mode">🌙</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <div class="primary-area">

            <!-- Input Card -->
            <section class="card" aria-label="System input">
                <h2 class="card-title">System Input — Ax = b</h2>

                <!-- Controls -->
                <div class="controls-row">
                    <div class="control-group">
                        <label for="matrix-size">Size</label>
                        <select id="matrix-size">
                            <option value="2">2 × 2</option>
                            <option value="3" selected>3 × 3</option>
                            <option value="4">4 × 4</option>
                            <option value="5">5 × 5</option>
                            <option value="6">6 × 6</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="method-select">Method</label>
                        <select id="method-select">
                            <option value="jacobi">Jacobi</option>
                            <option value="gauss-seidel">Gauss-Seidel</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="tolerance-input">Tolerance</label>
                        <select id="tolerance-input">
                            <option value="0.1">10⁻¹</option>
                            <option value="0.01">10⁻²</option>
                            <option value="0.001" selected>10⁻³</option>
                            <option value="0.0001">10⁻⁴</option>
                            <option value="0.00001">10⁻⁵</option>
                            <option value="0.000001">10⁻⁶</option>
                        </select>
                    </div>

                    <div class="control-group">
                        <label for="max-iterations">Max Iterations</label>
                        <select id="max-iterations">
                            <option value="10">10</option>
                            <option value="25" selected>25</option>
                            <option value="50">50</option>
                            <option value="100">100</option>
                        </select>
                    </div>

                    <div class="checkbox-group">
                        <input type="checkbox" id="compare-toggle">
                        <label for="compare-toggle">Compare methods</label>
                    </div>
                </div>

                <!-- Matrix Grid -->
                <div class="matrix-input-section">
                    <h3>Coefficient Matrix A</h3>
                    <div id="matrix-grid"></div>
                </div>

                <!-- B Vector -->
                <div id="b-vector-section">
                    <h3>Vector b</h3>
                    <div id="b-vector-inputs"></div>
                </div>

                <!-- Initial Guess -->
                <div id="initial-guess-section">
                    <h3>Initial Guess x⁽⁰⁾ <span class="hint">(leave blank for zeros)</span></h3>
                    <div id="initial-guess-inputs"></div>
                </div>

                <!-- Action Buttons -->
                <div class="btn-row">
                    <button id="calculate-btn" class="btn btn-primary" type="button">Solve</button>
                    <button id="random-btn" class="btn btn-secondary" type="button">Random (DD)</button>
                    <button id="clear-btn" class="btn btn-secondary" type="button">Clear</button>
                    <button id="import-toggle-btn" class="btn btn-secondary" type="button">Import</button>
                </div>

                <!-- Import Area -->
                <div id="import-section">
                    <textarea id="import-text" placeholder="Paste augmented matrix [A|b]. Rows separated by semicolons or newlines, columns by spaces or commas.&#10;Example: 4 -1 0 3; -1 4 -1 5; 0 -1 4 -3"></textarea>
                    <button id="import-btn" class="btn btn-small btn-secondary" type="button">Import</button>
                </div>

                <p style="font-size: 0.75rem; color: var(--text-muted); margin-top: 0.75rem;">
                    Tip: Press <kbd style="background:var(--bg-input);padding:1px 5px;border-radius:3px;border:1px solid var(--border-color);font-size:0.7rem;">Ctrl+Enter</kbd> to solve
                </p>
            </section>

            <!-- Output -->
            <section id="output" aria-label="Calculation results"></section>
        </div>

        <!-- History Panel -->
        <aside id="history-panel">
            <div class="card">
                <h2 class="card-title">
                    History
                    <button id="clear-history-btn" class="btn btn-small btn-secondary" type="button">Clear</button>
                </h2>
                <div id="history-list"></div>
            </div>
        </aside>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-inner">
            <span>&copy; 2022&ndash;2026 Arose Niazi</span>
            <nav class="footer-links" aria-label="Footer links">
                <a href="https://nc.arose-niazi.me/">NC Suite</a>
                <a href="https://github.com/Arose-Niazi/nc-iterative" target="_blank" rel="noopener noreferrer">GitHub</a>
                <a href="https://arose-niazi.me" target="_blank" rel="noopener noreferrer">Author</a>
            </nav>
        </div>
    </footer>

</body>
</html>
